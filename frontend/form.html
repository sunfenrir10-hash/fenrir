<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>新建仓位 · MINGK</title>
<meta name="description" content="输入生日时间和出生城市，生成你的人生 K 线图。" />
<meta property="og:type" content="website" />
<meta property="og:title" content="人生K线图 · 你的命运K线长什么样？" />
<meta property="og:description" content="120 字股评师式命理短卡，看看你是哪一只" />
<meta property="og:image" content="https://mingk.vercel.app/og-image.png" />
<meta property="og:url" content="https://mingk.vercel.app/form" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://mingk.vercel.app/og-image.png" />
<link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div id="site-header"></div>

<main class="page">
  <div class="form-wrap">

    <header class="form-head">
      <div class="form-head__kicker">/ NEW POSITION &nbsp; · &nbsp; 建仓参数</div>
      <h1 class="form-head__title">填入你的<br/>命数四维。</h1>
      <p class="form-head__sub">真太阳时会按出生城市经度自动校正；标的将基于此回测 100 年。</p>
    </header>

    <form id="chart-form" autocomplete="off" novalidate>

      <div class="field">
        <div class="field__label">
          <span class="name">生日<span class="req">*</span></span>
          <span class="hint">YYYY-MM-DD</span>
        </div>
        <div class="field__input">
          <input class="input" id="birth_date" type="date" required min="1900-01-01" max="2025-12-31" value="1991-05-12" />
        </div>
      </div>

      <div class="field">
        <div class="field__label">
          <span class="name">出生时间<span class="req">*</span></span>
          <span class="hint">HH:MM · 钟表时间</span>
        </div>
        <div class="field__input">
          <input class="input" id="birth_time" type="time" required value="08:00" />
        </div>
      </div>

      <div class="field">
        <div class="field__label">
          <span class="name">出生城市<span class="req">*</span></span>
          <span class="hint" id="city-hint">输入你出生的城市，未精确识别会兜底</span>
        </div>
        <div class="field__input">
          <input class="input" id="city" type="text" placeholder="例：北京、怀化、乌鲁木齐" required autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <div class="field__label">
          <span class="name">性别<span class="req">*</span></span>
          <span class="hint">影响大运排序</span>
        </div>
        <div class="field__input">
          <div class="radio-group">
            <label>
              <input type="radio" name="gender" value="1" checked />
              <span class="radio-text">男 · MALE</span>
            </label>
            <label>
              <input type="radio" name="gender" value="0" />
              <span class="radio-text">女 · FEMALE</span>
            </label>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="field__label">
          <span class="name">标的代号</span>
          <span class="hint">选填 · 显示在 K 线顶部</span>
        </div>
        <div class="field__input">
          <input class="input" id="title" type="text" maxlength="24" placeholder="例：我的命运K线 / 老张这只票" />
        </div>
      </div>

      <div class="form-error" id="err"></div>

      <div class="form-actions">
        <a class="btn btn--ghost" href="index.html">← 返回</a>
        <button class="btn btn--up btn--big" type="submit">提交 · 开始推演</button>
      </div>
    </form>

  </div>
</main>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
renderHeader();

(async function init() {
  const sel = document.getElementById("city");
  const hint = document.getElementById("city-hint");

  // 默认北京
  sel.value = "北京";

  // 恢复上次表单
  const prev = Store.loadForm();
  if (prev) {
    if (prev.birth_date) document.getElementById("birth_date").value = prev.birth_date;
    if (prev.birth_time) document.getElementById("birth_time").value = prev.birth_time;
    if (prev.city) sel.value = prev.city;
    if (prev.gender !== undefined) {
      const r = document.querySelector(`input[name=gender][value="${prev.gender}"]`);
      if (r) r.checked = true;
    }
    if (prev.title) document.getElementById("title").value = prev.title;
  }

  hint.textContent = "未精确识别会兜底（如有偏差请改用更通用名）";
})();

document.getElementById("chart-form").addEventListener("submit", function (ev) {
  ev.preventDefault();
  const errEl = document.getElementById("err");
  errEl.textContent = "";

  const data = {
    birth_date: document.getElementById("birth_date").value.trim(),
    birth_time: document.getElementById("birth_time").value.trim(),
    city: document.getElementById("city").value.trim(),
    gender: parseInt(document.querySelector('input[name=gender]:checked').value, 10),
    title: document.getElementById("title").value.trim() || null,
  };

  if (!data.birth_date) return errEl.textContent = "请填写生日。";
  if (!data.birth_time) return errEl.textContent = "请填写出生时间。";
  if (!data.city) return errEl.textContent = "请填写出生城市。";

  Store.saveForm(data);
  location.href = "waiting.html";
});
</script>
</body>
</html>
